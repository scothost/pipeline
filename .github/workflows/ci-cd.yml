name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Test
        run: echo "Hello World!"

  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Create a text file
        run: echo "Hello, World!" > hello.txt
      - name: Upload the text file
        uses: actions/upload-artifact@v4
        with:
          name: hello-artifact
          path: hello.txt        

